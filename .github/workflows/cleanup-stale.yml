# ======================================================================
# GITHUB ACTIONS: Stale Preview Cleanup (Cron + Manual)
# ======================================================================
#
# SAFETY NET for orphaned preview services.
# If the primary webhook cleanup fails (network timeout, API outage),
# this cron job finds Render services whose PRs are already closed
# and deletes them.
#
# TRIGGERS:
#   schedule: 2:00 AM UTC daily
#   workflow_dispatch: manual trigger with dry-run option
# ======================================================================

name: "🧹 Stale Preview Cleanup"

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list orphans without deleting'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PREVIEW_PREFIX: "preview-pr"
  RENDER_API_BASE: "https://api.render.com/v1"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    name: "🔍 Find & Clean Orphaned Previews"

    steps:
      - name: "📋 Log Cleanup Start"
        run: |
          echo "============================================"
          echo "  STALE PREVIEW CLEANUP"
          echo "============================================"
          echo "Time:     $(date -u)"
          echo "Dry Run:  ${{ github.event.inputs.dry_run || 'false' }}"
          echo "Trigger:  ${{ github.event_name }}"
          echo "============================================"

      - name: "🔍 Scan & Clean Orphaned Services"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          REPO: ${{ github.repository }}
          RENDER_API_BASE_URL: ${{ env.RENDER_API_BASE }}
        run: |
          python3 << 'CLEANUP_SCRIPT'
          import json, os, re, sys
          import urllib.request

          # ── Config from environment ─────────────────────────────
          render_api = os.environ['RENDER_API_BASE_URL']
          api_key    = os.environ['RENDER_API_KEY']
          gh_token   = os.environ['GH_TOKEN']
          dry_run    = os.environ.get('DRY_RUN', 'false') == 'true'
          repo       = os.environ['REPO']

          def api_get(url, token, label=""):
              """Make a GET request with auth header."""
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github.v3+json",
              })
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"  ❌ Failed to fetch {label}: {e}")
                  return None

          def api_delete(url, token):
              """Make a DELETE request with auth header."""
              req = urllib.request.Request(url, method='DELETE', headers={
                  "Authorization": f"Bearer {token}",
              })
              urllib.request.urlopen(req, timeout=15)

          # ── Step 1: Fetch all Render services ───────────────────
          print("📡 Fetching Render services...")
          data = api_get(f"{render_api}/services?limit=50", api_key, "Render services")
          if data is None:
              print("❌ Cannot reach Render API — aborting")
              sys.exit(1)

          # Filter to preview services only
          previews = []
          for s in data:
              svc = s.get('service', s)
              name = svc.get('name', '')
              match = re.search(r'preview-pr-(\d+)', name)
              if match:
                  previews.append({
                      'name': name,
                      'id': svc.get('id'),
                      'pr': int(match.group(1)),
                      'created': svc.get('createdAt', 'unknown'),
                  })

          print(f"\n📊 Found {len(previews)} preview service(s)")
          if not previews:
              print("✅ No preview services found — nothing to clean")
              sys.exit(0)

          # ── Step 2: Check each PR status via GitHub API ─────────
          orphans = []
          for p in previews:
              pr_data = api_get(
                  f"https://api.github.com/repos/{repo}/pulls/{p['pr']}",
                  gh_token, f"PR #{p['pr']}"
              )
              if pr_data is None:
                  print(f"  ⚠️ Could not check PR #{p['pr']} — skipping")
                  continue

              state = pr_data.get('state', 'unknown')
              if state == 'closed':
                  orphans.append(p)
                  print(f"  🔴 PR #{p['pr']} is CLOSED — {p['name']} is orphaned")
              else:
                  print(f"  🟢 PR #{p['pr']} is OPEN — {p['name']} is valid")

          print(f"\n🗑️ Found {len(orphans)} orphaned service(s)")
          if not orphans:
              print("✅ No orphans to clean up")
              sys.exit(0)

          # ── Step 3: Delete orphaned services ────────────────────
          deleted = 0
          for o in orphans:
              if dry_run:
                  print(f"  [DRY RUN] Would delete: {o['name']} (ID: {o['id']})")
                  continue

              print(f"  🗑️ Deleting: {o['name']}...")
              try:
                  api_delete(f"{render_api}/services/{o['id']}", api_key)
                  print(f"  ✅ Deleted: {o['name']}")
                  deleted += 1
              except Exception as e:
                  print(f"  ❌ Failed to delete {o['name']}: {e}")

          print(f"\n✅ Cleanup complete! Deleted {deleted}/{len(orphans)} orphans.")
          CLEANUP_SCRIPT

      - name: "📊 Summary"
        if: always()
        run: |
          echo "============================================"
          echo "  CLEANUP COMPLETE"
          echo "  Time: $(date -u)"
          echo "============================================"
